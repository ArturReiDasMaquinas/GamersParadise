<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal Retro - NES</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #e94560; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #a2a2bc; margin: 0; font-size: 1.1rem; }

        /* O botão bonitão de Upload */
        .btn-upload {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .btn-upload:hover { background-color: #ff5c77; transform: scale(1.05); }

        /* O container do jogo começa escondido */
        #game-container { 
            width: 800px; 
            height: 600px; 
            max-width: 100%; 
            border: 4px solid #0f3460; 
            border-radius: 10px;
            box-shadow: 0px 0px 30px rgba(233, 69, 96, 0.4); 
            background: #000;
            overflow: hidden;
            display: none; /* Só aparece quando carregar o jogo */
        }

        .instructions {
            background: #0f3460;
            padding: 15px 30px;
            border-radius: 8px;
            border-left: 5px solid #e94560;
            max-width: 800px;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Central de Emulação</h1>
        <p>Selecione um jogo do seu PC para começar.</p>
    </header>
    
    <input type="file" id="rom-upload" accept=".nes" style="display: none;">
    <button class="btn-upload" onclick="document.getElementById('rom-upload').click()">
        📁 Carregar ROM de NES
    </button>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <div class="instructions" id="instrucoes">
        <h3>Como jogar:</h3>
        <ul>
            <li>Clique no botão acima e escolha um arquivo <b>.nes</b>.</li>
            <li>O jogo rodará instantaneamente direto do seu navegador.</li>
            <li><strong>Saves:</strong> O progresso é salvo no navegador. Exporte seu save pelo menu caso vá mudar de computador.</li>
        </ul>
    </div>

    <script>
        // Escuta quando o usuário escolhe um arquivo
        document.getElementById('rom-upload').addEventListener('change', function(event) {
            let file = event.target.files[0];
            if (!file) return;

            // Transforma o arquivo local em um link "falso" que o emulador entende
            let romTemporariaURL = URL.createObjectURL(file);

            // Esconde as instruções e mostra a tela do jogo
            document.getElementById('instrucoes').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            // Inicia a configuração do Emulador
            window.EJS_player = '#game';
            window.EJS_core = 'nes'; 
            window.EJS_color = '#e94560'; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
            
            // Passa a ROM que acabamos de carregar
            window.EJS_gameUrl = romTemporariaURL; 

            // Injeta o motor do emulador só AGORA (evita o erro de rede)
            let script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
        });
    </script>
    
</body>
</html>
