<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Retro - Multiconsolas</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #e94560; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #a2a2bc; margin: 0; font-size: 1.1rem; }

        .nav-bar { margin-top: 15px; margin-bottom: 20px; }
        .btn-nav {
            background-color: #0f3460; color: #fff; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            border: 1px solid #e94560; transition: 0.3s;
        }
        .btn-nav:hover { background-color: #e94560; color: white; }

        /* Painel de Controle (Seletor + Botão) */
        .control-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            background: #0f3460;
            padding: 15px 25px;
            border-radius: 8px;
            border: 2px solid #e94560;
        }

        select {
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 5px;
            border: none;
            background: #1a1a2e;
            color: white;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        .btn-upload {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-upload:hover { background-color: #ff5c77; transform: scale(1.05); }

        /* O container do jogo começa escondido */
        #game-container { 
            width: 800px; height: 600px; max-width: 100%; 
            border: 4px solid #0f3460; border-radius: 10px;
            box-shadow: 0px 0px 30px rgba(233, 69, 96, 0.4); 
            background: #000; overflow: hidden; display: none; 
        }

        .instructions, .credits {
            background: #0f3460; padding: 15px 30px; border-radius: 8px;
            border-left: 5px solid #e94560; max-width: 800px; width: 100%; margin-bottom: 20px;
        }
        .credits { background: #11111f; border-left: 5px solid #a2a2bc; color: #ccc; font-size: 0.9rem; }
        .credits h3 { color: #a2a2bc; margin-top: 0; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Central de Emulação</h1>
        <p>Selecione a consola e carregue o seu jogo.</p>
        
        <div class="nav-bar">
            <a href="cantinho.html" class="btn-nav">📂 Visitar o Cantinho do Artur</a>
        </div>
    </header>
    
    <div class="control-panel" id="painel-controles">
        <select id="console-selector" onchange="atualizarExtensao()">
            <option value="nes" data-ext=".nes">Nintendo
