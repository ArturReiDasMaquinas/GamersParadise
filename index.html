<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Central Retro - SNES & Mega Drive</title>
    <style>
        body { background-color: #1a1a2e; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #e94560; text-transform: uppercase; }
        
        /* Botão para o link externo */
        .btn-link { 
            background-color: #0f3460; 
            color: #fff; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            border: 1px solid #e94560; 
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-link:hover { background-color: #e94560; }

        .control-panel { background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #game-container { width: 800px; height: 600px; background: #000; display: none; border-radius: 10px; }
        .btn-upload { background-color: #e94560; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Central Retro</h1>
        <a href="https://www.youtube.com/@Senhor1Up" class="btn-link" target="_blank">📺 Visitar Canal Senhor1Up</a>
    </header>
    
    <div class="control-panel">
        <select id="console-selector">
            <option value="snes" data-ext=".sfc,.smc">Super Nintendo (SNES)</option>
            <option value="segaMD" data-ext=".md,.smd,.gen,.bin">Mega Drive</option>
        </select>
        <button class="btn-upload" onclick="document.getElementById('rom-upload').click()">🕹️ Carregar ROM</button>
        <input type="file" id="rom-upload" style="display: none;">
    </div>

    <div id="game-container"><div id="game"></div></div>

    <script>
        document.getElementById('rom-upload').addEventListener('change', function(event) {
            let file = event.target.files[0];
            if (!file) return;
            let consoleEscolhido = document.getElementById('console-selector').value;
            let romURL = URL.createObjectURL(file);
            document.getElementById('game-container').style.display = 'block';
            window.EJS_player = '#game';
            window.EJS_core = consoleEscolhido;
            window.EJS_gameUrl = romURL;
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            let script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
