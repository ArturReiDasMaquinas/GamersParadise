<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Artur</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #e94560; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #a2a2bc; margin: 0; font-size: 1.1rem; }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-box {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #e94560;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .section-box h2 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #1a1a2e;
            padding-bottom: 10px;
        }

        /* Grid para Imagens */
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .image-gallery img {
            width: 100%;
            border-radius: 5px;
            border: 2px solid #1a1a2e;
            transition: 0.3s;
        }
        .image-gallery img:hover { transform: scale(1.05); }

        /* Estilo para Áudios */
        .audio-item {
            margin-bottom: 15px;
            background: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
        }
        .audio-item p { color: #fff; margin-bottom: 8px; font-size: 0.9rem; }
        audio { width: 100%; height: 35px; outline: none; }

        /* Estilo para Vídeos */
        .video-item { width: 100%; margin-bottom: 15px; }
        video { width: 100%; border-radius: 5px; border: 2px solid #1a1a2e; }

        /* Botão de Voltar */
        .btn-voltar {
            display: inline-block;
            background-color: #e94560;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-voltar:hover { background-color: #ff5c77; }
    </style>
</head>
<body>

    <header>
        <h1>👾 Cantinho do Artur</h1>
        <p>Meus arquivos, projetos e tralhas digitais.</p>
        <a href="index.html" class="btn-voltar">⬅ Voltar para o Emulador</a>
    </header>

    <div class="container">
        
        <div class="section-box">
            <h2>🖼️ Galeria de Imagens</h2>
            <div class="image-gallery">
                <img src="imagens/project-utopia-wip.png" alt="Progresso do Project Utopia">
                <img src="imagens/logo-super-games-world.png" alt="Logo Super Games World">
                <img src="imagens/setup-bancada.jpg" alt="Minha Bancada">
            </div>
        </div>

        <div class="section-box">
            <h2>🎵 Áudios e Produções</h2>
            
            <div class="audio-item">
                <p>Trilha Sonora - PU:BnP (WIP)</p>
                <audio controls>
                    <source src="audios/trilha-fase1.mp3" type="audio/mpeg">
                    Seu navegador não suporta áudio.
                </audio>
            </div>

            <div class="audio-item">
                <p>Mixagem de Teste - FL Studio</p>
                <audio controls>
                    <source src="audios/mix-teste.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="section-box">
            <h2>🎬 Vídeos</h2>
            
            <div class="video-item">
                <p style="color: #ccc; margin-bottom: 5px;">Gameplay Teste - SRB2</p>
                <video controls>
                    <source src="videos/gameplay-teste.mp4" type="video/mp4">
                    Seu navegador não suporta vídeos.
                </video>
            </div>
        </div>

    </div>

</body>
</html>
