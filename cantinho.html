<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galeria</title>
    <style>
        body { background-color: #1a1a2e; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #0f3460; padding: 20px; margin: 20px auto; max-width: 600px; border-radius: 10px; border-left: 5px solid #e94560; }
        .btn-voltar { background: #e94560; color: white; padding: 10px; text-decoration: none; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🖼️ Galeria</h1>
    <a href="index.html" class="btn-voltar">⬅ Voltar</a>

    <div class="box">
        <h3>Imagem</h3>
        <img src="./imagens/imagem1.png" style="width:100%; border-radius:5px;" alt="Imagem">
    </div>

    <div class="box">
        <h3>Áudio</h3>
        <audio controls>
            <source src="./audios/audio1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="box">
        <h3>Vídeo</h3>
        <video controls style="width:100%;">
            <source src="./videos/video1.mp4" type="video/mp4">
        </video>
    </div>
</body>
</html>
