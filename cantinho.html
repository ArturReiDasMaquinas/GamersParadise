<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Artur</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #e94560; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #a2a2bc; margin: 0; font-size: 1.1rem; }

        .container {
            width: 100%;
            max-width: 800px; /* Deixei um pouco mais estreito já que tem menos coisas */
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-box {
            background: #0f3460;
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #e94560;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .section-box h2 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #1a1a2e;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .item-label {
            color: #e94560;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            text-align: left;
        }

        /* Estilo da Imagem */
        .image-item img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid #1a1a2e;
            background-color: #000;
        }

        /* Estilo do Áudio */
        .audio-card {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 6px;
        }
        audio { width: 100%; height: 40px; outline: none; }

        /* Estilo do Vídeo */
        .video-card {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 6px;
        }
        video { width: 100%; border-radius: 4px; background: #000; outline: none; }

        /* Botão de Voltar */
        .btn-voltar {
            display: inline-block;
            background-color: #e94560;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-voltar:hover { background-color: #ff5c77; }
    </style>
</head>
<body>

    <header>
        <h1>👾 Cantinho do Artur</h1>
        <p>Espaço pessoal para arquivos e projetos.</p>
        <a href="index.html" class="btn-voltar">⬅ Voltar para o Emulador</a>
    </header>

    <div class="container">
        
        <div class="section-box">
            <h2>🖼️ Imagem em Destaque</h2>
            <div class="image-item">
                <p class="item-label">Minha Imagem</p>
                <img src="imagens/imagem1.png" alt="Imagem 1">
            </div>
        </div>

        <div class="section-box">
            <h2>🎵 Áudio</h2>
            <div class="audio-card">
                <p class="item-label">Meu Áudio</p>
                <audio controls>
                    <source src="audios/audio1.mp3" type="audio/mpeg">
                    Seu navegador não suporta a tag de áudio.
                </audio>
            </div>
        </div>

        <div class="section-box">
            <h2>🎬 Gameplay</h2>
            <div class="video-card">
                <p class="item-label">Vídeo de Gameplay</p>
                <video controls>
                    <source src="videos/video1.mp4" type="video/mp4">
                    Seu navegador não suporta a tag de vídeo.
                </video>
            </div>
        </div>

    </div>

</body>
</html>
